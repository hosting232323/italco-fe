lint_frontend:
  stage: housekeeping
  image: node:22
  interruptible: true
  allow_failure: true
  tags:
    - test
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  script:
    - npm ci
    - npx eslint "src/**/*.{js,vue}"

deps_check:
  stage: housekeeping
  image: node:22
  interruptible: true
  allow_failure: true
  tags:
    - test
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  script:
    - npm ci --prefer-offline 2>/dev/null || npm ci
    - npm audit --audit-level=high || AUDIT_EXIT=$?
    - npm audit --audit-level=high --json > npm-audit-report.json || true
    - exit ${AUDIT_EXIT:-0}
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - npm-audit-report.json
